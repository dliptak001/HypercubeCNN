name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: windows-latest
            compiler: msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13 (Linux)
        if: matrix.compiler == 'gcc' && matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13

      - name: Configure (Linux/macOS)
        if: matrix.os != 'windows-latest'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DHCNN_NATIVE_ARCH=OFF \
            -DHCNN_FAST_MATH=OFF \
            -DHCNN_WERROR=ON

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DHCNN_NATIVE_ARCH=OFF -DHCNN_FAST_MATH=OFF -DHCNN_WERROR=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  install-and-find-package:
    name: install + find_package consumer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure + build + install
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/_prefix \
            -DHCNN_NATIVE_ARCH=OFF \
            -DHCNN_FAST_MATH=OFF
          cmake --build build --parallel
          cmake --install build

      - name: Build a consumer with find_package
        run: |
          mkdir -p /tmp/consumer && cd /tmp/consumer
          cat > main.cpp <<'EOF'
          #include "HCNN.h"
          #include <iostream>
          int main() {
              hcnn::HCNN net(5, 4);
              net.AddConv(8);
              net.RandomizeWeights();
              std::cout << "HCNN consumer OK: DIM=" << net.GetStartDim()
                        << " N=" << net.GetStartN() << "\n";
              return 0;
          }
          EOF
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.21)
          project(consumer LANGUAGES CXX)
          find_package(HypercubeCNN REQUIRED)
          add_executable(consumer main.cpp)
          target_link_libraries(consumer PRIVATE HypercubeCNN::HypercubeCNNCore)
          EOF
          cmake -B build -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/_prefix
          cmake --build build
          ./build/consumer
